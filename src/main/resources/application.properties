spring.application.name=API Empleados

#Configuración MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/empleados?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Configuración de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Para ver las SQL que se ejecutan poner las siguientes (opcional)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# TamaÃąo mÃĄximo de fichero individual
spring.servlet.multipart.max-file-size=10MB
# TamaÃąo mÃĄximo de la peticiÃģn completa (puede llevar varios ficheros)
spring.servlet.multipart.max-request-size=20MB
# Carpeta base donde se guardarÃĄn los ficheros subidos
app.storage.location=uploads
